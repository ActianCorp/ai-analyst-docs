# Theme Configuration
theme:
  name: material
  logo: assets/images/actian-logo.svg
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.instant
    - navigation.expand
    - navigation.path
    - navigation.footer
    - navigation.sections
    - search.highlight
    - search.share
    - search.suggest
    - search.focus
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - scheme: slate
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  custom_dir: theme_overrides/
  icon:
    repo: fontawesome/brands/github
    edit: fontawesome/regular/pen-to-square
  font: false
  favicon: assets/favicon.png
  
  # Static files
  static_templates:
    - 404.html

# Markdown Extensions
markdown_extensions:
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
      auto_title: false
      linenums: false
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - plantuml_markdown:
      server: https://www.plantuml.com/plantuml
      format: svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true 
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      title: On this page
      permalink: true
  - meta

# Copyright
copyright: >-
  Copyright &copy; 2026, Actian

extra:
  version:
    provider: mike
  analytics: 
    provider: custom
    property: G-NHC5CN295F
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback!


# Repository
repo_url: https://github.com/ActianCorp/ai-analyst-docs
repo_name: ActianCorp/ai-analyst-docs
edit_uri: "edit/main/docs/"

# Customization
extra_css:
  - assets/stylesheets/style.css?v=2
  # - stylesheets/minichat.css  # disabled: Zeenea chatbot
  - stylesheets/dx_style.css
  - assets/stylesheets/actian-landing.css?v=4
  - stylesheets/extra.css
  - stylesheets/comprehensive-nav.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/marked/marked.min.js
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
  - javascripts/search_enhancement.js
  - javascripts/extra.js
  - javascripts/comprehensive-nav.js
  - path: javascripts/current.js
    defer: true
  # - path: javascripts/MiniChatJavaScript.js  # disabled: Zeenea chatbot
  #   defer: true

plugins:
  - search:
      lang: en
      separator: '[\s\-\.,:!=\[\]()\"/]+|(?!\d)\.(?!\d)|\.(?!\d)|[0-9]+'
  - awesome-pages
  - tags:
  - swagger-ui-tag
  - mike:
      canonical_version: latest
      alias_type: redirect
  - git-revision-date-localized:
      type: date
      fallback_to_build_date: true
      enable_creation_date: false
  - minify:
      minify_html: true
  - meta:
      meta_file: .meta.yml
  - meta-descriptions

# Hooks
hooks:
  - hooks/section_index.py
  - hooks/custom_lexers.py
