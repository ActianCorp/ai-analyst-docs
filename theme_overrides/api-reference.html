<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>API Reference &mdash; {{ config.site_name }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; padding: 0; font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* ── Top navigation bar — light mode (matches docs site header) ── */
    #api-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      padding: 0 1rem;
      gap: 0.5rem;
      z-index: 9999;
    }

    #api-topbar a {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
    }
    #api-topbar a:hover { opacity: 0.8; }

    #api-topbar img {
      height: 24px;
      width: auto;
    }

    #api-topbar .site-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #238ffb;
    }

    /* Push Scalar content below the fixed header */
    #scalar-app {
      padding-top: 56px;
      height: 100vh;
    }

    /* ── Dark mode ── */
    @media (prefers-color-scheme: dark) {
      #api-topbar {
        background: #0f172a;
        border-bottom-color: #334155;
      }
      #api-topbar .site-title { color: #60a5fa; }
      #api-topbar img { filter: brightness(0) invert(1); }
    }
  </style>
</head>
<body>

  <div id="api-topbar">
    <a id="home-link" href="../../index.html" title="Back to documentation">
      <img src="../../assets/images/actian-logo.svg" alt="{{ config.site_name }}" />
      <span class="site-title">{{ config.site_name }}</span>
    </a>
  </div>

  <div id="scalar-app"></div>

  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@latest/dist/browser/standalone.js" crossorigin="anonymous"></script>

  <script>
    var base    = window.location.href;
    var specUrl = new URL('../../assets/wobby-api.openapi.yaml', base).href;
    var homeUrl = new URL('../../index.html', base).href;
    document.getElementById('home-link').href = homeUrl;

    Scalar.createApiReference('#scalar-app', {
      url: specUrl,
      theme: 'default',
      layout: 'default',
      defaultHttpClient: { targetKey: 'shell', clientKey: 'curl' },
      hideDownloadButton: false,
      showSidebar: true,
      authentication: { preferredSecurityScheme: 'BearerAuth' }
    });
  </script>

</body>
</html>
